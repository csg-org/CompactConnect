env:
  contexts:
  - name: test
    urls:
    - https://app.test.compactconnect.org
    - https://api.test.compactconnect.org
    includePaths:
    - https://app.test.compactconnect.org.*
    - https://api.test.compactconnect.org.*
    authentication:
      verification:
        method: response
        pollFrequency: 60
        pollUnits: requests
        pollUrl: ""
        pollPostData: ""
    sessionManagement:
      method: cookie
    technology: {}
    structure: {}
  parameters: {}
jobs:
- type: script
  parameters:
    name: Bearer token
    type: httpsender
    action: add
    engine: "ECMAScript : Graal.js"
    source: bearer-token.js
    target: ""
    inline: ""
- type: script
  parameters:
    name: Bearer token
    type: httpsender
    action: enable
    engine: ""
    target: ""
    inline: ""
- type: openapi
  parameters:
    apiFile: /zap/wrk/backend/compact-connect/docs/internal/api-specification/latest-oas30-zap.json
    apiUrl: ""
    targetUrl: "https://api.test.compactconnect.org"
    context: test
    user: ""
- type: passiveScan-config
  parameters: {}
- type: spider
  parameters:
    context: test
    maxDuration: 5
    maxDepth: 5
    maxChildren: 20
  tests:
  - name: At least 20 URLs found
    type: stats
    onFail: WARN
    statistic: automation.spider.urls.added
    operator: '>='
    value: 20
- type: passiveScan-wait
  parameters: {}
- type: activeScan
  parameters:
    context: test
    maxScanDurationInMins: 45
- type: report
  parameters:
    template: risk-confidence-html
    theme: original
    reportDir: /zap/wrk/report
    reportFile: ""
    reportTitle: ZAP by Checkmarx Scanning Report
    reportDescription: Test environment ZAP report
    displayReport: false
  risks:
  - info
  - low
  - medium
  - high
  confidences:
  - falsepositive
  - low
  - medium
  - high
  - confirmed
  sections:
  - siteRiskCounts
  - responseBody
  - appendix
  - alertTypes
  - responseHeader
  - alertTypeCounts
  - riskConfidenceCounts
  - alerts
  - aboutThisReport
  - contents
  - requestBody
  - reportDescription
  - reportParameters
  - requestHeader
  - summaries
- type: exitStatus
  parameters:
    warnExitValue: 0
