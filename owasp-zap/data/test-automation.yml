env:
  contexts:
  - name: test
    urls:
    - https://api.test.compactconnect.org
    - https://search.test.compactconnect.org
    includePaths:
    - https://api.test.compactconnect.org.*
    - https://search.test.compactconnect.org.*
    authentication:
      verification:
        method: response
        pollFrequency: 60
        pollUnits: requests
        pollUrl: ""
        pollPostData: ""
    sessionManagement:
      method: cookie
    technology: {}
    structure: {}
  parameters: {}
jobs:
- type: script
  parameters:
    name: Bearer token
    type: httpsender
    action: add
    engine: "ECMAScript : Graal.js"
    source: bearer-token.js
    target: ""
    inline: ""
- type: script
  parameters:
    name: Bearer token
    type: httpsender
    action: enable
    engine: ""
    target: ""
    inline: ""
- type: openapi
  parameters:
    apiFile: /zap/wrk/backend/compact-connect/docs/internal/api-specification/latest-oas30-zap.json
    apiUrl: ""
    targetUrl: "https://api.test.compactconnect.org"
    context: test
    user: ""
- type: openapi
  parameters:
    apiFile: /zap/wrk/backend/compact-connect/docs/search-internal/api-specification/latest-oas30-zap.json
    apiUrl: ""
    targetUrl: "https://search.test.compactconnect.org"
    context: test
    user: ""
# Suppress known false positives
- type: alertFilter
  alertFilters:
  # SQL Injection on initiateRecovery — API uses DynamoDB not SQL.
  # ZAP flags this because the 400 validation error reflects input back,
  # which looks like successful boolean-based injection.
  - ruleId: 40018
    newRisk: "False Positive"
    url: https://api.test.compactconnect.org/v1/provider-users/initiateRecovery
    urlRegex: false
- type: passiveScan-config
  parameters: {}
- type: passiveScan-wait
  parameters: {}
- type: activeScan
  parameters:
    context: test
    maxScanDurationInMins: 45
- type: report
  parameters:
    template: risk-confidence-html
    theme: original
    reportDir: /zap/wrk/report
    reportFile: ""
    reportTitle: ZAP by Checkmarx Scanning Report
    reportDescription: Test environment ZAP report
    displayReport: false
  risks:
  - info
  - low
  - medium
  - high
  confidences:
  - falsepositive
  - low
  - medium
  - high
  - confirmed
  sections:
  - siteRiskCounts
  - responseBody
  - appendix
  - alertTypes
  - responseHeader
  - alertTypeCounts
  - riskConfidenceCounts
  - alerts
  - aboutThisReport
  - contents
  - requestBody
  - reportDescription
  - reportParameters
  - requestHeader
  - summaries
- type: exitStatus
  parameters:
    warnExitValue: 0
