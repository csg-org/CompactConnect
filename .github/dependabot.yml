# Dependabot version updates configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  #---------------------------------------------------------------------------
  # Python dependencies (pip-compile / pip-tools)
  #
  # Split per backend project to stay within job time limits. Each entry
  # covers the CDK app requirements.in and all lambda requirements.in files.
  # Minor/patch updates are grouped into a single PR per project; major
  # updates get individual PRs.
  #---------------------------------------------------------------------------

  # compact-connect
  - package-ecosystem: "pip"
    directories:
      - "/backend/compact-connect"
      - "/backend/compact-connect/lambdas/python/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    cooldown:
      default-days: 7
    groups:
      compact-connect-python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # compact-connect-ui-app (no python lambdas, only top-level CDK directory)
  - package-ecosystem: "pip"
    directories:
      - "/backend/compact-connect-ui-app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    cooldown:
      default-days: 7
    groups:
      ui-app-python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # cosmetology-app
  - package-ecosystem: "pip"
    directories:
      - "/backend/cosmetology-app"
      - "/backend/cosmetology-app/lambdas/python/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    cooldown:
      default-days: 7
    groups:
      cosmetology-python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # social-work-app
  - package-ecosystem: "pip"
    directories:
      - "/backend/social-work-app"
      - "/backend/social-work-app/lambdas/python/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    cooldown:
      default-days: 7
    groups:
      social-work-python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # multi-account
  - package-ecosystem: "pip"
    directories:
      - "/backend/multi-account/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    cooldown:
      default-days: 7
    groups:
      multi-account-python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  #---------------------------------------------------------------------------
  # Node.js dependencies (backend lambdas)
  #---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directories:
      - "/backend/*/lambdas/nodejs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "node"
    # Require packages to be at least 7 days old before proposing updates.
    # This does NOT apply to security updates, which are always immediate.
    cooldown:
      default-days: 7
    groups:
      node-minor-patch:
        update-types:
          - "minor"
          - "patch"

  #---------------------------------------------------------------------------
  # Frontend dependencies (webroot)
  #---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directories:
      - "/webroot"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    cooldown:
      default-days: 7
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  #---------------------------------------------------------------------------
  # GitHub Actions
  #---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
