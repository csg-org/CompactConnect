name: Check-Internal-API-Spec-Update

on:
  pull_request:
    paths:
      - backend/compact-connect/stacks/api_stack/v1_api/**
      - backend/cosmetology-app/stacks/api_stack/v1_api/**
      - backend/social-work-app/stacks/api_stack/v1_api/**

env:
  AWS_REGION : "us-east-1"

# Permission can be added at job level or workflow level
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:

  CheckForApiSpecUpdate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to compare with base branch

      - name: Check for API spec update
        run: |
          set -euo pipefail

          echo "Checking if OpenAPI specification has been updated..."
          echo "Verifying each project whose internal API stack changed also updated its spec file."

          # Get the base branch from GitHub context
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "Base branch: $BASE_BRANCH"

          PROJECTS=(
            compact-connect
            cosmetology-app
            social-work-app
          )

          FAILED=0
          CHECKED=0

          check_project() {
            local project="$1"
            local api_path="backend/${project}/stacks/api_stack/v1_api"
            local spec_path="backend/${project}/docs/internal/api-specification/latest-oas30.json"

            if ! git diff "origin/${BASE_BRANCH}..HEAD" --name-only -- "$api_path" | grep -q .; then
              return 0
            fi

            CHECKED=$((CHECKED + 1))
            echo ""
            echo "Detected changes under: ${api_path}"

            if git diff "origin/${BASE_BRANCH}..HEAD" --name-only -- "$spec_path" | grep -q .; then
              echo "✅ ${project}: internal OpenAPI spec updated at ${spec_path}"
            else
              echo "🚨 ${project}: API stack changed but internal OpenAPI spec was not updated!"
              echo "   Update: ${spec_path}"
              FAILED=1
            fi
          }

          for project in "${PROJECTS[@]}"; do
            check_project "$project"
          done

          if [ "$CHECKED" -eq 0 ]; then
            echo ""
            echo "No internal API stack changes detected for monitored projects; nothing to verify."
            exit 0
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "When you modify API stack files, you must also update that project's OpenAPI specification."
            echo "This ensures API documentation stays in sync with the implementation."
            exit 1
          fi

          echo ""
          echo "✅ SUCCESS: All projects with internal API stack changes also updated their OpenAPI spec."
